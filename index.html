<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f6f8">
<title>ポケチャン編成支援</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <p class="brand-kicker">Pokémon Champions</p>
        <h1 id="page-title">編成支援</h1>
      </div>
      <button type="button" class="icon-btn" id="show-chart-btn" aria-label="タイプ相性表を開く" title="相性表" hidden>☰</button>
    </header>

    <div class="tabs" role="tablist" aria-label="メイン切替">
      <button type="button" role="tab" id="tab-team" aria-selected="true" aria-controls="view-team">編成</button>
      <button type="button" role="tab" id="tab-quiz" aria-selected="false" aria-controls="view-quiz">相性クイズ</button>
    </div>

    <!-- ===== 編成ビュー ===== -->
    <section class="view" id="view-team" role="tabpanel" aria-labelledby="tab-team">
      <p class="rule-note">
        Regulation Set <strong>M-B</strong> 全参戦 <span id="roster-count">—</span>体から構築可能。環境上位は大会データを優先し、それ以外は役割・相性から自動編成します。
      </p>

      <div class="panel">
        <label class="field-label" for="poke-search">軸ポケモン（1〜2体）</label>
        <div class="search-wrap">
          <input id="poke-search" class="search-input" type="search" placeholder="名前で検索（例: メガリザードンY / Charizard）" autocomplete="off">
          <div class="search-results" id="search-results" role="listbox"></div>
        </div>
        <div class="selected-row" id="selected-pokemon"></div>
      </div>

      <div class="segmented" role="group" aria-label="対戦形式">
        <button type="button" id="format-singles" aria-pressed="true">シングル（3選出）</button>
        <button type="button" id="format-doubles" aria-pressed="false">ダブル（4選出）</button>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="suggest-btn" disabled>編成候補を見る</button>
      </div>

      <p class="section-title">編成候補</p>
      <div class="core-list" id="core-list">
        <p class="empty-state">ポケモンを選んで候補を表示できます</p>
      </div>

      <div id="team-detail" hidden>
        <p class="section-title" id="detail-title">詳細</p>
        <p class="item-warn" id="item-warn" hidden></p>
        <div class="member-list" id="member-list"></div>
      </div>
    </section>

    <!-- ===== 相性クイズ ===== -->
    <section class="view" id="view-quiz" role="tabpanel" aria-labelledby="tab-quiz" hidden>
      <div class="segmented" role="group" aria-label="相手のタイプ数">
        <button type="button" id="mode-single" aria-pressed="false">1タイプ</button>
        <button type="button" id="mode-dual" aria-pressed="true">2タイプ</button>
      </div>

      <section class="panel opponent" aria-live="polite">
        <p class="opponent-label">相手のタイプ</p>
        <div class="type-chips" id="opponent-chips"></div>
      </section>

      <div class="quiz-actions">
        <button type="button" class="btn btn-primary" id="generate-btn">ランダム生成</button>
        <button type="button" class="btn btn-ghost" id="reveal-btn" aria-pressed="false">正解を見る</button>
      </div>

      <p class="section-title">どのタイプの技で攻撃する？</p>
      <div class="types-grid" id="attack-buttons"></div>
      <div class="result" id="result-area" aria-live="polite"></div>
      <p class="hint">相性表は右上メニュー、<kbd>Esc</kbd> で閉じる / <kbd>R</kbd> 再生成 / <kbd>A</kbd> 正解</p>
    </section>
  </div>

  <div class="sheet-backdrop" id="chart-modal" aria-hidden="true">
    <div class="sheet" id="chart-sheet" role="dialog" aria-modal="true" aria-labelledby="chart-title">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <h2 id="chart-title">タイプ相性表</h2>
        <button type="button" class="icon-btn" id="close-modal-btn" aria-label="閉じる">×</button>
      </div>
      <div class="sheet-body">
        <div class="legend">
          <strong>見方：</strong> 行が攻撃側、列が防御側。<br>
          <span style="color:#c62828;font-weight:800;">◯</span> ばつぐん(x2) /
          <span style="color:#1565c0;">△</span> いまひとつ(x0.5) /
          <span style="color:#757575;">×</span> 無効(x0) /
          - 等倍
        </div>
        <div class="chart-scroll" id="chart-container"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
